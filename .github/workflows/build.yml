name: Build and Deploy

on:
  push:
    branches: ["main"] # Only deploy from your primary branch
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile LaTeX
        # Using a pre-built Docker image is MUCH faster than apt-get install
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          # This handles bibtex and multiple runs automatically
          args: "-pdf -bibtex -interaction=nonstopmode -outdir=docs"

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: ./docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2